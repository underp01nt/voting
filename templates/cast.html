<!DOCTYPE html>
<html lang="en">
<script src="/static/js/cast.js"></script>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
    <title>Cast Ballot - Project AIR</title>
</head>
<body>    
    <div class="index" style="height: auto; padding: 40px; align-items: stretch;"> 
        <h1>Voting Platform</h1>
        <p class="subtitle">Select candidates to build your list of approvals</p>
        <hr class="gov-divider">

        <div class="voting-grid">
            <div class="candidates-column">
                <h3>Select Candidates</h3>
                <div class="search-container" style="position: relative; margin-bottom: 20px;">
                    <input type="text" id="candidate-search" placeholder="Search candidates..." class="gov-input" onkeyup="filterCandidates()" onfocus="showDropdown()" onblur="hideDropdown()">
                    <div id="search-dropdown" class="gov-dropdown" style="display: none; position: absolute; width: 100%; background: white; border: 1px solid #d6d7d9; z-index: 1000; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
                    </div>
                </div>

            </div>

            <div class="cart-column">
                <h3>Your Approval List (Shopping Cart)</h3>
                <div id="cart" class="cart-section">
                    <p id="empty-msg">No candidates selected. Your approval list will appear here.</p>
                </div>
                
                <div id="action-container" style="display: none; margin-top: 20px;">
                    <button class="btn btn-primary btn-wide">Submit Approval List</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
