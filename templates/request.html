<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
    <title>Verification Options - Project AIR</title>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Identity Verification</h1>
            <p class="subtitle">
                Please select a verification method to continue
            </p>

            <hr class="gov-divider">

            <div class="verification-options">

                <form action="/request" method="get">
                    <input type="hidden" name="verification_type" value="manual">

                    <button type="submit"
                            class="btn btn-primary btn-wide verification-btn">
                        Register with Manual Input
                    </button>
                </form>

                <form action="/request" method="get">
                    <input type="hidden" name="verification_type" value="government_id">

                    <button type="submit"
                            class="btn btn-primary btn-wide verification-btn">
                        Register with Government ID
                    </button>
                </form>

            </div>

            <div class="auth-footer">
                <a href="/" class="back-link">← Go back</a>
            </div>
        </div>
    </div>
</body>
</html>
