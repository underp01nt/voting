<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
    <title>Request - Project AIR</title>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Identity Verification</h1>
            <p class="subtitle">Please enter your details to request a token</p>
            <hr class="gov-divider">

            <form action="/submit-request" method="post" class="gov-form">

                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required class="gov-input">
                </div>

                <div class="form-group">
                    <label for="address">Address</label>
                    <input type="text" id="address" name="address" required class="gov-input">
                </div>

                <div class="form-group">
                    <label for="dob">Date of Birth</label>
                    <input type="date" id="dob" name="dob" required class="gov-input">
                </div>

                <div class="form-group">
                    <label for="ssn4">Last 4 Digits of SSN</label>
                    <input type="password" id="ssn4" name="ssn4" required maxlength="4" pattern="[0-9]{4}" inputmode="numeric" class="gov-input short-input">
                </div>

                <button type="submit" class="btn btn-primary btn-wide">Submit Request</button>
            </form>

            <div class="auth-footer">
                <a href="/request" class="back-link">← Go back</a>
            </div>
        </div>
    </div>
</body>
</html>
